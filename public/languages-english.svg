<svg viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="englishGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="250" fill="url(#englishGradient)" opacity="0.1" rx="15"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="url(#englishGradient)" stroke-width="2" opacity="0.3"/>
  <circle cx="250" cy="200" r="35" fill="none" stroke="url(#englishGradient)" stroke-width="2" opacity="0.2"/>
  
  <!-- Main circle background -->
  <circle cx="150" cy="120" r="65" fill="url(#englishGradient)" opacity="0.15"/>
  
  <!-- English text "A a" -->
  <text x="150" y="145" font-size="90" font-weight="bold" text-anchor="middle" fill="url(#englishGradient)" font-family="Arial, sans-serif">
    A a
  </text>
  
  <!-- Label -->
  <text x="150" y="220" font-size="20" font-weight="600" text-anchor="middle" fill="#667eea" font-family="Arial, sans-serif">
    English
  </text>
</svg>